<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Planet Merge</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #000012;
        overflow: hidden;
        touch-action: none;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
        font-family: 'Segoe UI', sans-serif;
        color: #fff;
      }
      #game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
      }
      #hud {
        display: flex;
        gap: 24px;
        font-size: clamp(14px, 4vw, 18px);
        text-shadow: 0 0 8px rgba(100,200,255,0.8);
      }
      #score-label { color: #adf; }
      #score { font-size: clamp(18px, 5vw, 24px); font-weight: bold; color: #fff; }
      #hiscore-label { color: #fda; }
      #hiscore { font-size: clamp(16px, 4.5vw, 20px); color: #ffc; }
      #next-area {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: clamp(12px, 3.5vw, 14px);
        color: #adf;
      }
      canvas { display: block; cursor: none; touch-action: none; }
      #overlay {
        position: absolute;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.75);
        border-radius: 50%;
        gap: 14px;
        display: none;
      }
      #overlay.visible { display: flex; }
      #overlay h2 { font-size: clamp(22px, 6vw, 32px); color: #f66; text-shadow: 0 0 16px #f00; }
      #overlay .final-score { font-size: clamp(16px, 4.5vw, 22px); color: #fff; text-align: center; padding: 0 16px; }
      #retry-btn {
        padding: 10px 28px;
        font-size: clamp(15px, 4vw, 18px);
        background: linear-gradient(135deg, #336, #66c);
        color: #fff;
        border: 2px solid #88f;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.1s;
        -webkit-tap-highlight-color: transparent;
      }
      #retry-btn:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div><span id="score-label">SCORE </span><span id="score">0</span></div>
        <div><span id="hiscore-label">BEST </span><span id="hiscore">0</span></div>
      </div>
      <div id="next-area">
        NEXT: <canvas id="next-canvas" width="60" height="60"></canvas>
      </div>
      <div style="position:relative;">
        <canvas id="game-canvas"></canvas>
        <div id="overlay">
          <h2>GAME OVER</h2>
          <div class="final-score" id="final-score"></div>
          <button id="retry-btn">RETRY</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
